<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stockate - Deposit</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/lightweight-charts/4.0.1/lightweight-charts.standalone.production.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Roboto',sans-serif;}
:root{
  --primary-white:#fff;--primary-navy:#0b172a;--bg-dark:#0b172a;--bg-card:#0c3c01;
  --text-primary:#e6f1ff;--text-secondary:#9aaac7;--border-color:rgba(255,255,255,0.1);
  --hover-color:rgba(0,255,153,0.1);--active-color:#00ff99;--success-color:#26a69a;
  --fail-color:#ff4d4d;
}
body.light{
  --bg-dark:#f5f8fa;--bg-card:#fff;--text-primary:#0b172a;--text-secondary:#44607a;
  --border-color:rgba(11,23,42,0.1);
}
body{
  background:var(--bg-dark);
  color:var(--text-primary);
  transition:background 0.4s ease, color 0.4s ease;
}
.container{display:flex;flex-direction:column;min-height:100vh;}
/* Navbar */
.navbar{
  background:var(--bg-card);padding:10px 20px;display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid var(--border-color);position:sticky;top:0;z-index:99;
  animation:fadeDown 0.6s ease;
}
@keyframes fadeDown {from{opacity:0;transform:translateY(-20px);}to{opacity:1;transform:translateY(0);}}
.logo{
  font-size:24px;font-weight:bold;color:var(--active-color);
  animation:slideInLeft 0.8s ease;
}
@keyframes slideInLeft {from{opacity:0;transform:translateX(-40px);}to{opacity:1;transform:translateX(0);}}
.nav-items{display:flex;gap:15px;list-style:none;}
.nav-item {
  padding: 8px 14px;
  cursor: pointer;
  color: var(--primary-white);
  border-radius: 6px;
  transition: color 0.3s ease, background-color 0.3s ease, box-shadow 0.3s ease, transform 0.3s ease;
  text-decoration: none;
  display: inline-block;
}

.nav-item:hover {
  background: var(--hover-color);
  color: var(--active-color);
  transform: translateY(-3px) scale(1.05);
  box-shadow: 0 6px 15px rgba(0, 255, 153, 0.45);
}

.nav-item.active {
  background: var(--active-color);
  color: #000;
  box-shadow: 0 0 10px var(--active-color);
  transform: none;
}

/* Optional: add a subtle underline animation on hover */
.nav-item::after {
  content: '';
  display: block;
  height: 2px;
  width: 0;
  background: var(--active-color);
  transition: width 0.3s ease;
  margin-top: 4px;
  border-radius: 2px;
}

.nav-item:hover::after {
  width: 100%;
}

/* For anchor links inside nav-item */
.nav-item a {
  color: inherit;
  text-decoration: none !important;
  display: inline-block;
  transition: inherit;
}


.menu-toggle {
  display: none;
  flex-direction: column;
  gap: 4px;
  cursor: pointer;
}
.menu-toggle span{width:24px;height:2px;background:var(--primary-white);}
@media(max-width:900px){
  .nav-items{display:none;flex-direction:column;width:100%;background:var(--bg-card);position:absolute;top:60px;left:0;}
  .nav-items.show{display:flex;animation:fadeIn 0.4s ease;}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  .menu-toggle{display:flex;}
}
/* Main */
.main-content{padding:20px;flex:1;}
.deposit-section{
  background:var(--bg-card);padding:30px 15px;border-radius:12px;border:1px solid var(--border-color);
  max-width:430px;margin:22px auto;text-align:center;
  transition:transform 0.3s ease,border-color 0.3s ease;animation:fadeUp 0.6s ease;
}
@keyframes fadeUp {from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.deposit-section:hover{transform:translateY(-4px) scale(1.02);border-color:var(--active-color);box-shadow:0 4px 20px rgba(0,255,153,0.15);}
.deposit-section h2{margin-bottom:12px;}
.deposit-form input, .deposit-form select, .deposit-form button{
  width:100%;padding:10px;margin:8px 0;border-radius:7px;border:1px solid var(--border-color);
  background:var(--bg-dark);color:var(--text-primary);font-size:17px;transition:background 0.3s;
}
.deposit-form button{
  background:var(--active-color);color:#000;cursor:pointer;font-weight:500;
}
.deposit-form button:hover{opacity:.86;}
.balance{font-size:21px;font-weight:bold;margin-bottom:15px;color:var(--success-color);animation:pulseGreen 1.5s infinite;}
@keyframes pulseGreen{0%{box-shadow:0 0 5px rgba(0,255,153,0.3);}50%{box-shadow:0 0 15px rgba(0,255,153,0.7);}100%{box-shadow:0 0 5px rgba(0,255,153,0.3);}}
.history-actions{display:flex;justify-content:space-between;align-items:center;margin-top:10px;}
.transaction-history{margin-top:22px;text-align:left;}
.transaction-history h3{margin-bottom:10px;}
.transaction-list{list-style:none;max-height:200px;overflow-y:auto;padding:0;}
.transaction-item{padding:11px 5px;border-bottom:1px solid var(--border-color);font-size:16px;transition:background 0.3s;}
.transaction-item:hover{background:var(--hover-color);}
.transaction-tag{font-size:12px;font-weight:bold;border-radius:5px;padding:1px 8px;display:inline-block;margin-right:7px;}
.transaction-tag.deposit{background:var(--success-color);color:#fff;}
.transaction-tag.withdraw{background:var(--fail-color);color:#fff;}
.success-message,.fail-message{font-weight:bold;margin:8px 0;display:none;}
.success-message{color:var(--success-color);}
.fail-message{color:var(--fail-color);}
.theme-btn{background:var(--active-color);color:#000;padding:7px 12px;border:none;border-radius:6px;cursor:pointer;margin-left:8px;transition:background 0.3s;}
.export-btn{background:var(--primary-white);color:var(--primary-navy);padding:7px 13px;border-radius:8px;border:none;cursor:pointer;margin-left:6px;transition:background 0.3s;}
.export-btn:hover,.theme-btn:hover{opacity:0.85;}
#newsTicker{padding:8px;background:var(--bg-dark);color:var(--active-color);border-radius:6px;margin-bottom:8px;font-size:15px;}
#aiInsightText{font-size:15px;margin:7px 0;}
#balance-chart{height:140px;width:100%;margin:12px 0;}
/* shimmer loader */
.shimmer{
  position:relative;
  background:linear-gradient(90deg,var(--bg-dark) 25%,var(--bg-card) 50%,var(--bg-dark) 75%);
  background-size:200% 100%;
  animation:shimmer 1.2s infinite;
  height:16px;border-radius:4px;
}
@keyframes shimmer {0%{background-position:-200% 0;}100%{background-position:200% 0;}}
</style>
</head>
<body>
<div class="container">
<header class="navbar">
  <div class="logo">AlphaAnalytics</div>
  <div class="menu-toggle" onclick="document.querySelector('.nav-items').classList.toggle('show')">
    <span></span><span></span><span></span>
  </div>
  <nav class="nav-items">
    <a href="jeet.html" class="nav-item">Dashboard</a>
    <a href="portfolio.html" class="nav-item">Portfolio</a>
    <a href="mystock.html" class="nav-item">My Stock</a>
    <a href="deposit.html" class="nav-item active">Deposit</a>
    <a href="insight.html" class="nav-item">Insight</a>
    
    <a href="prediction.html" class="nav-item">Prediction</a>
    <a href="news.html" class="nav-item">News Update</a>
    <a href="videos.html" class="nav-item">Videos</a>
    <a href="help.html" class="nav-item">Help Center</a>
    
    <a href="profile.html" class="nav-item">Profile</a>
  </nav>
</header>
<main class="main-content">
  <div id="newsTicker"></div>
  <div style="background:var(--bg-card);border-radius:12px;padding:14px;margin-bottom:15px;">
    <h3>AI Deposit Tips</h3>
    <p id="aiInsightText"></p>
  </div>
  <div class="deposit-section">
    <h2>Deposit Funds</h2>
    <div class="balance">Current Balance: ₹<span id="balance">5000</span></div>
    <div id="balance-chart"></div>
    <form class="deposit-form" id="deposit-form">
      <input type="number" id="amount" placeholder="Enter amount (₹)" min="1" required>
      <select id="payment-method" required>
        <option value="">Select Payment Method</option>
        <option value="upi">UPI</option>
        <option value="netbanking">Net Banking</option>
        <option value="creditcard">Credit Card</option>
        <option value="debitcard">Debit Card</option>
      </select>
      <button type="submit">Deposit Now</button>
    </form>
    <p class="success-message" id="success-message">Deposit Successful!</p>
    <p class="fail-message" id="fail-message">Deposit Failed! Invalid amount.</p>
    <div class="history-actions">
      <h3>Transaction History</h3>
      <div>
        <button class="export-btn" onclick="exportHistory()">Export CSV</button>
        <button class="theme-btn" onclick="toggleTheme()">Theme</button>
      </div>
    </div>
    <ul class="transaction-list" id="transaction-list"></ul>
  </div>
</main>
</div>
<script>
let balanceArr=[5000];
function updateBalanceChart(){
  let container=document.getElementById("balance-chart");
  container.innerHTML="";
  let chart=LightweightCharts.createChart(container,{height:120,width:360,layout:{backgroundColor:"transparent",textColor:"var(--text-primary)"}});
  let series=chart.addLineSeries();
  let points=balanceArr.map((bal,i)=>({time:i+1,value:bal}));
  series.setData(points);
}
function renderHistory(){
  let list=document.getElementById("transaction-list");
  list.innerHTML='';
  let hist=JSON.parse(localStorage.getItem("depositHistory")||"[]");
  if(!hist.length){
    for(let i=0;i<3;i++){
      list.innerHTML+=`<li class="transaction-item"><div class="shimmer" style="width:80%;height:14px;"></div></li>`;
    }
    return;
  }
  hist.forEach(item=>{
    let li=document.createElement("li");
    li.className="transaction-item";
    let tag=`<span class="transaction-tag deposit">DEPOSIT</span>`;
    li.innerHTML=`${tag} Deposited ₹${item.amount} via ${item.method.toUpperCase()} @ ${item.time}`;
    list.appendChild(li);
  });
}
function addHistory(amount,method){
  let hist=JSON.parse(localStorage.getItem("depositHistory")||"[]");
  hist.unshift({amount,method,time:new Date().toLocaleString()});
  localStorage.setItem("depositHistory",JSON.stringify(hist));
}
document.getElementById("deposit-form").addEventListener("submit",function(e){
  e.preventDefault();
  let amount=parseInt(document.getElementById("amount").value);
  let method=document.getElementById("payment-method").value;
  let balElem=document.getElementById("balance");
  if(amount>0){
    balElem.textContent = parseInt(balElem.textContent)+amount;
    balanceArr.push(parseInt(balElem.textContent));
    document.getElementById("success-message").style.display="block";
    document.getElementById("fail-message").style.display="none";
    addHistory(amount,method);
    renderHistory();
    updateBalanceChart();
    setTimeout(()=>document.getElementById("success-message").style.display="none",2000);
  } else {
    document.getElementById("fail-message").style.display="block";
    document.getElementById("success-message").style.display="none";
    setTimeout(()=>document.getElementById("fail-message").style.display="none",2000);
  }
  document.getElementById("deposit-form").reset();
});
function exportHistory(){
  let arr=JSON.parse(localStorage.getItem("depositHistory")||"[]")||[];
  let csv="Amount,Method,Time\n"+arr.map(h=>`${h.amount},${h.method},${h.time}`).join("\n");
  let blob=new Blob([csv],{type:"text/csv"});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="deposits.csv";
  a.click();
}
function toggleTheme(){document.body.classList.toggle('light');}
function updateAIInsight(){
  let tips=[
    "Use UPI for faster settlement.",
    "Track large deposits for portfolio optimization.",
    "Diversify deposit methods for security.",
    "Frequent small deposits reduce risk."
  ];
  document.getElementById('aiInsightText').textContent = tips[Math.floor(Math.random()*tips.length)];
}
setInterval(updateAIInsight,4000);updateAIInsight();
function rotateNews(){
  let arr=[
    "UPI volumes reach new record this week.",
    "Net Banking: RBI plans infrastructure upgrade.",
    "Credit Card rewards changing in new policy.",
    "More investors deposit funds for IPO rush."
  ];
  let i=0;
  setInterval(()=>{
    document.getElementById('newsTicker').textContent=arr[i%arr.length];
    i++;
  },2900);
}
rotateNews();
window.onload=()=>{
  updateBalanceChart();
  renderHistory();
};
</script>
</body>
</html>
