<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Profile - Stockate</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Roboto',sans-serif;}
:root{
 --primary-white:#fff;--bg-dark:#0b172a;--bg-card:#0c3c01;
 --text-primary:#e6f1ff;--text-secondary:#9aaac7;--border-color:rgba(255,255,255,0.08);
 --hover-color:rgba(0,255,153,0.1);--active-color:#00ff99;
 --fail-color:#ef5350;--success-color:#2ecc71;
}
body.light{
 --bg-dark:#f5f8fa;--bg-card:#fff;--text-primary:#0b172a;--text-secondary:#44607a;
 --border-color:rgba(11,23,42,0.1);
}
body{
 background:var(--bg-dark);
 color:var(--text-primary);
 transition:background 0.4s ease,color 0.4s ease;
}
.container{display:flex;flex-direction:column;min-height:100vh;}

/* Navbar with animations */
.navbar{
 background:var(--bg-card);padding:12px 20px;display:flex;justify-content:space-between;align-items:center;
 border-bottom:1px solid var(--border-color);position:sticky;top:0;z-index:100;
 animation:fadeDown 0.6s ease;
}
@keyframes fadeDown{from{opacity:0;transform:translateY(-20px);}to{opacity:1;transform:translateY(0);}}
.logo{font-size:22px;font-weight:bold;color:var(--active-color);animation:slideInLeft 0.8s ease;}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-40px);}to{opacity:1;transform:translateX(0);}}
.nav-items{display:flex;gap:15px;}
.nav-item {
  padding: 8px 14px;
  cursor: pointer;
  color: var(--primary-white);
  border-radius: 6px;
  transition: color 0.3s ease, background-color 0.3s ease, box-shadow 0.3s ease, transform 0.3s ease;
  text-decoration: none;
  display: inline-block;
}

.nav-item:hover {
  background: var(--hover-color);
  color: var(--active-color);
  transform: translateY(-3px) scale(1.05);
  box-shadow: 0 6px 15px rgba(0, 255, 153, 0.45);
}

.nav-item.active {
  background: var(--active-color);
  color: #000;
  box-shadow: 0 0 10px var(--active-color);
  transform: none;
}

/* Optional: add a subtle underline animation on hover */
.nav-item::after {
  content: '';
  display: block;
  height: 2px;
  width: 0;
  background: var(--active-color);
  transition: width 0.3s ease;
  margin-top: 4px;
  border-radius: 2px;
}

.nav-item:hover::after {
  width: 100%;
}

/* For anchor links inside nav-item */
.nav-item a {
  color: inherit;
  text-decoration: none !important;
  display: inline-block;
  transition: inherit;
}


.menu-toggle {
  display: none;
  flex-direction: column;
  gap: 4px;
  cursor: pointer;
}
.menu-toggle span{width:22px;height:2px;background:var(--primary-white);}
@media(max-width:900px){
 .nav-items{display:none;flex-direction:column;position:absolute;top:60px;left:0;width:100%;background:var(--bg-card);}
 .nav-items.show{display:flex;animation:fadeIn 0.4s ease;}
 @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
 .menu-toggle{display:flex;}
}
.theme-toggle-btn{background:var(--active-color);color:#000;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;transition:background 0.3s;}
.theme-toggle-btn:hover{opacity:0.85;}

/* Main Content */
.main-content{flex:1;padding:20px;max-width:1200px;margin:auto;width:100%;}
.notification-bar{
 display:none;background:rgba(0,255,153,.07);padding:10px 12px;border-radius:8px;margin-bottom:18px;
 color:var(--active-color);font-weight:500;animation:fadeDown 0.5s ease;
}

/* Stats */
.profile-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:20px;margin-bottom:25px;}
.profile-stat-card{
 background:var(--bg-card);border:1px solid var(--border-color);border-radius:10px;padding:16px;text-align:center;
 transition:transform 0.3s ease,border-color 0.3s ease;
}
.profile-stat-card:hover{transform:translateY(-4px) scale(1.02);border-color:var(--active-color);box-shadow:0 4px 15px rgba(0,255,153,0.15);}
.profile-stat-label{font-size:14px;color:var(--text-secondary);}
.profile-stat-value{font-size:20px;font-weight:700;margin-top:4px;}

/* Profile Section */
.profile-section{background:var(--bg-card);border:1px solid var(--border-color);border-radius:12px;padding:20px;max-width:550px;margin:auto;}
.avatar{width:80px;height:80px;background:var(--bg-dark);color:var(--active-color);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:700;position:relative;overflow:hidden;}
.avatar img{width:100%;height:100%;object-fit:cover;}
.avatar input{display:none;}
.avatar-edit-btn{position:absolute;right:0;bottom:0;background:var(--active-color);color:#000;font-size:14px;padding:2px 6px;cursor:pointer;border-radius:50% 0 0 0;}
.profile-info{display:flex;flex-direction:column;gap:14px;margin-top:16px;}
.profile-info label{color:var(--text-secondary);font-size:14px;}
.profile-info input{padding:10px;border-radius:8px;border:1px solid var(--border-color);background:var(--bg-card);color:var(--text-primary);}
.profile-info input:disabled{background:rgba(255,255,255,0.05);}

/* Buttons */
.profile-actions{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;}
.profile-actions button{padding:9px 14px;border:none;border-radius:7px;cursor:pointer;font-weight:500;transition:background 0.3s;}
.logout-btn{background:var(--fail-color);color:#fff;}
.logout-btn:hover{opacity:0.85;}
.save-btn{background:var(--active-color);color:#000;}
.save-btn:hover{background:#14faac;}
.cancel-btn{background:gray;color:#fff;}
.cancel-btn:hover{opacity:0.85;}

/* Modal */
.dialog-backdrop{position:fixed;left:0;top:0;width:100%;height:100%;background:rgba(0,0,0,0.3);display:flex;justify-content:center;align-items:center;}
.dialog{background:var(--bg-card);color:var(--text-primary);padding:20px;border-radius:10px;border:1px solid var(--border-color);width:300px;display:flex;flex-direction:column;gap:10px;}
.dialog input{padding:8px;border-radius:6px;border:1px solid var(--border-color);background:var(--bg-dark);color:var(--text-primary);}
</style>
</head>
<body>
<div class="container">
<header class="navbar">
  <div class="logo">AlphaAnalytics</div>
  <div class="menu-toggle" onclick="document.querySelector('.nav-items').classList.toggle('show')">
    <span></span><span></span><span></span>
  </div>
  <nav class="nav-items">
    <a href="jeet.html" class="nav-item">Dashboard</a>
    <a href="portfolio.html" class="nav-item">Portfolio</a>
    <a href="mystock.html" class="nav-item">My Stock</a>
    <a href="deposit.html" class="nav-item">Deposit</a>
    <a href="insight.html" class="nav-item">Insight</a>
    <a href="prediction.html" class="nav-item">Prediction</a>
    <a href="news.html" class="nav-item">News Update</a>
    <a href="videos.html" class="nav-item">Videos</a>
    <a href="help.html" class="nav-item">Help Center</a>
     
    <a href="profile.html" class="nav-item active">Profile</a>
  </nav>
  
</header>

<main class="main-content">
  <div class="notification-bar" id="notificationBar"></div>
  <div class="profile-stats">
    <div class="profile-stat-card">
      <span class="profile-stat-label">Total Funds</span>
      <span class="profile-stat-value" id="profileFunds">₹0</span>
    </div>
    <div class="profile-stat-card">
      <span class="profile-stat-label">Last Login</span>
      <span class="profile-stat-value" id="profileLastLogin">--</span>
    </div>
    <div class="profile-stat-card">
      <span class="profile-stat-label">Member</span>
      <span class="profile-stat-value" id="profileMemberStatus">--</span>
    </div>
  </div>

  <div class="profile-section">
    <div style="display:flex;align-items:center;gap:15px;">
      <div class="avatar" id="userAvatar">
        <span id="avatarInitials">U</span>
        <img id="avatarImg" style="display:none;">
        <input type="file" id="avatarUpload" accept="image/*">
        <span class="avatar-edit-btn" onclick="document.getElementById('avatarUpload').click()">✎</span>
      </div>
      <button onclick="openPasswordDialog()" class="save-btn">Change Password</button>
    </div>

    <div class="profile-info">
      <div>
        <label>Username:</label>
        <input type="text" id="username" disabled />
      </div>
      <div>
        <label>Email:</label>
        <input type="email" id="email" disabled />
      </div>
      <div>
        <label>Role:</label>
        <input type="text" id="role" disabled />
      </div>
      <div class="profile-actions">
        <button id="editProfileBtn" class="save-btn">Edit</button>
        <button id="saveProfileBtn" class="save-btn" style="display:none;">Save</button>
        <button id="cancelProfileBtn" class="cancel-btn" style="display:none;">Cancel</button>
        <button id="logoutBtn" class="logout-btn">Logout</button>
      </div>
    </div>
  </div>
</main>
</div>

<!-- Password Modal -->
<div id="dialogBack" style="display:none;">
  <div class="dialog-backdrop" onclick="closeDialog(event)">
    <div class="dialog" onclick="event.stopPropagation()">
      <b>Change Password</b>
      <input type="password" id="currentpwd" placeholder="Current password">
      <input type="password" id="newpwd" placeholder="New password">
      <input type="password" id="confirmpwd" placeholder="Confirm password">
      <button onclick="changePassword()" class="save-btn">Update</button>
      <button onclick="closeDialog()" class="cancel-btn">Cancel</button>
      <div id="pwdmsg" style="font-size:13px;color:var(--fail-color);"></div>
    </div>
  </div>
</div>

<script>
const defaultUser = {username:"Guest",email:"guest@demo.com",role:"User",funds:0,lastLogin:"--",member:"Basic",avatar:""};
let user = defaultUser;

async function loadProfile(){
  let profile = localStorage.getItem("profile");
  if(profile){
    user = JSON.parse(profile);
    fillProfile();
  } else {
    try {
      const res = await fetch("http://localhost:3000/api/me", { credentials: "include" });
      if(res.ok){
        const data = await res.json();
        user = {
          ...data.user,
          funds: 12880,
          lastLogin: new Date().toISOString().slice(0, 16).replace("T", " "),
          member: "Premium",
          avatar: ""
        };
        localStorage.setItem("profile", JSON.stringify(user));
        fillProfile();
      } else { fillProfile(); }
    } catch(e){ console.error(e); fillProfile(); }
  }
}

function fillProfile(){
  username.value = user.username || "Guest";
  email.value = user.email || "guest@demo.com";
  role.value = user.role || "User";
  document.getElementById("profileFunds").textContent = `₹${user.funds}`;
  profileLastLogin.textContent = user.lastLogin;
  profileMemberStatus.textContent = user.member;
  setAvatar(user.avatar);
}

function saveUser(){ localStorage.setItem("profile", JSON.stringify(user)); }
function setAvatar(src){
  const img = document.getElementById("avatarImg");
  const ini = document.getElementById("avatarInitials");
  if(src){ img.src = src; img.style.display="block"; ini.style.display="none"; }
  else { img.style.display="none"; ini.textContent = (user.username||"U")[0]; ini.style.display="block"; }
}

avatarUpload.onchange = e =>{
  const file = e.target.files;
  if(file){
    const reader = new FileReader();
    reader.onload = ev =>{
      user.avatar = ev.target.result;
      saveUser();
      setAvatar(user.avatar);
      notify("Avatar updated!");
    };
    reader.readAsDataURL(file);
  }
};

editProfileBtn.onclick = ()=>{
  document.querySelectorAll('.profile-info input').forEach(inp=>inp.disabled=false);
  editProfileBtn.style.display='none';
  saveProfileBtn.style.display='inline-block';
  cancelProfileBtn.style.display='inline-block';
};
saveProfileBtn.onclick = ()=>{
  user.username = username.value.trim();
  user.email = email.value.trim();
  saveUser();
  document.querySelectorAll('.profile-info input').forEach(inp=>inp.disabled=true);
  setAvatar(user.avatar);
  notify("Profile updated");
  editProfileBtn.style.display='inline-block';
  saveProfileBtn.style.display='none';
  cancelProfileBtn.style.display='none';
};
cancelProfileBtn.onclick = ()=>{
  username.value = user.username;
  email.value = user.email;
  document.querySelectorAll('.profile-info input').forEach(inp=>inp.disabled=true);
  editProfileBtn.style.display='inline-block';
  saveProfileBtn.style.display='none';
  cancelProfileBtn.style.display='none';
};
logoutBtn.onclick = ()=>{
  fetch("http://localhost:3000/api/logout", { method:"POST", credentials:"include" })
    .finally(()=>{ localStorage.clear(); location.href="login.html"; });
};

function notify(msg){
  const nb=document.getElementById("notificationBar");
  nb.textContent=msg;nb.style.display='block';
  setTimeout(()=>nb.style.display='none',2500);
}
function toggleTheme(){ document.body.classList.toggle('light'); }
function openPasswordDialog(){ dialogBack.style.display='block'; pwdmsg.textContent=""; }
function closeDialog(e){ if(!e || e.target.classList.contains('dialog-backdrop')) dialogBack.style.display='none'; }
function changePassword(){
  if(newpwd.value.length<5){pwdmsg.textContent="Password too short";return;}
  if(newpwd.value!==confirmpwd.value){pwdmsg.textContent="Passwords do not match";return;}
  pwdmsg.style.color="var(--success-color)";
  pwdmsg.textContent="Password changed (demo)";
  setTimeout(()=>{closeDialog();notify("Password changed!");},1000);
}

loadProfile();
</script>
</body>
</html>
