<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stockate - Stock Predictions</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Roboto',sans-serif;}
:root{
 --primary-white:#fff; --bg-dark:#0b172a; --bg-card:#0c3c01;
 --text-primary:#e6f1ff; --text-secondary:#9aaac7; --border-color:rgba(255,255,255,0.1);
 --hover-color:rgba(0,255,153,0.1); --active-color:#00ff99;
}
body.light {
 --bg-dark:#f5f8fa; --bg-card:#fff; --text-primary:#0b172a; --text-secondary:#44607a;
 --border-color:rgba(11,23,42,0.1);
}
body {
 background:var(--bg-dark);
 color:var(--text-primary);
 min-height:100vh;
 transition:background 0.4s ease,color 0.4s ease;
}

/* Navbar */
.navbar {
 background:var(--bg-card); padding:10px 20px;
 display:flex; justify-content:space-between; align-items:center;
 border-bottom:1px solid var(--border-color); position:sticky; top:0; z-index:100;
 animation: fadeDown 0.6s ease;
}
@keyframes fadeDown{from{opacity:0;transform:translateY(-20px);}to{opacity:1;transform:translateY(0);}}
.logo { font-size:22px; font-weight:bold; color:var(--active-color); display:flex; align-items:center; gap:8px; animation: slideInLeft 0.8s ease; }
@keyframes slideInLeft{from{opacity:0;transform:translateX(-40px);}to{opacity:1;transform:translateX(0);}}
.nav-items { display:flex; gap:15px; list-style:none; }
.nav-item {
  padding: 8px 14px;
  cursor: pointer;
  color: var(--primary-white);
  border-radius: 6px;
  transition: color 0.3s ease, background-color 0.3s ease, box-shadow 0.3s ease, transform 0.3s ease;
  text-decoration: none;
  display: inline-block;
}

.nav-item:hover {
  background: var(--hover-color);
  color: var(--active-color);
  transform: translateY(-3px) scale(1.05);
  box-shadow: 0 6px 15px rgba(0, 255, 153, 0.45);
}

.nav-item.active {
  background: var(--active-color);
  color: #000;
  box-shadow: 0 0 10px var(--active-color);
  transform: none;
}

/* Optional: add a subtle underline animation on hover */
.nav-item::after {
  content: '';
  display: block;
  height: 2px;
  width: 0;
  background: var(--active-color);
  transition: width 0.3s ease;
  margin-top: 4px;
  border-radius: 2px;
}

.nav-item:hover::after {
  width: 100%;
}

/* For anchor links inside nav-item */
.nav-item a {
  color: inherit;
  text-decoration: none !important;
  display: inline-block;
  transition: inherit;
}


.menu-toggle {
  display: none;
  flex-direction: column;
  gap: 4px;
  cursor: pointer;
}
.menu-toggle span{width:22px;height:2px;background:var(--primary-white);}
@media(max-width:900px){
 .nav-items{display:none;flex-direction:column;position:absolute;top:60px;left:0;width:100%;
  background:var(--bg-card);}
 .nav-items.show{display:flex;animation:fadeIn 0.4s ease;}
 @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
 .menu-toggle{display:flex;}
}
.theme-toggle-btn{
 background:var(--active-color);color:#000;border:none;padding:6px 12px;
 border-radius:6px;cursor:pointer;transition:background 0.3s;
}
.theme-toggle-btn:hover{opacity:0.85;}

/* Main content */
.main-content{padding:20px;max-width:1200px;margin:auto;}
.header {display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:15px;}
.header h1{display:flex;align-items:center;gap:8px;font-size:24px;}
.header p{color:var(--text-secondary);font-size:14px;}

/* Iframe Container */
.iframe-container {
 position:relative; height:600px; background:var(--bg-card);
 border:1px solid var(--border-color); border-radius:12px; overflow:hidden;
 box-shadow:0 4px 15px rgba(0,0,0,0.25);
 transition:transform 0.3s ease,border-color 0.3s ease;
}
.iframe-container:hover{transform:translateY(-4px) scale(1.01);border-color:var(--active-color);}
iframe {width:100%;height:100%;border:none;}
.loading-overlay {
 position:absolute;top:0;left:0;width:100%;height:100%;
 background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;
 color:var(--active-color);font-size:18px;z-index:10;flex-direction:column;gap:10px;
}

/* Shimmer loader */
.shimmer {
 position:relative;
 background:linear-gradient(90deg, var(--bg-dark) 25%, var(--bg-card) 50%, var(--bg-dark) 75%);
 background-size:200% 100%;
 animation:shimmer 1.2s infinite;
 border-radius:4px;
}
@keyframes shimmer {0%{background-position:-200% 0;}100%{background-position:200% 0;}}
</style>
</head>
<body>
<div class="container">
  <!-- Navbar -->
  <header class="navbar">
    <div class="logo"><i class="fas fa-chart-line"></i> AlphaAnalytics</div>
    <div class="menu-toggle" onclick="document.querySelector('.nav-items').classList.toggle('show')">
      <span></span><span></span><span></span>
    </div>
    <nav class="nav-items">
      <a href="jeet.html" class="nav-item">Dashboard</a>
      <a href="portfolio.html" class="nav-item">Portfolio</a>
      <a href="mystock.html" class="nav-item">My Stock</a>
      <a href="deposit.html" class="nav-item">Deposit</a>
      <a href="insight.html" class="nav-item">Insight</a>
      <a href="prediction.html" class="nav-item active">Prediction</a>
      <a href="news.html" class="nav-item">News Update</a>
      <a href="videos.html" class="nav-item">Videos</a>
      <a href="help.html" class="nav-item">Help Center</a>
      <a href="profile.html" class="nav-item">Profile</a>
    </nav>
    
  </header>

  <!-- Main -->
  <main class="main-content">
    <div class="header">
      <h1><i class="fas fa-bullseye"></i> Stock Predictions</h1>
      <p>Interactive predictions dashboard (powered by Dash)</p>
    </div>

    <div class="iframe-container">
      <div class="loading-overlay" id="loadingOverlay">
        <div class="shimmer" style="width:60%;height:20px;"></div>
        <div class="shimmer" style="width:40%;height:16px;"></div>
      </div>
      <iframe src="http://localhost:8080/dash/" onload="hideLoader()"></iframe>
    </div>
  </main>
</div>

<script>
function toggleTheme(){ document.body.classList.toggle('light'); }
function hideLoader(){ document.getElementById('loadingOverlay').style.display='none'; }
</script>
</body>
</html>
